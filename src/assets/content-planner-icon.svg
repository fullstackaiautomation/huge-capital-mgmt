<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 675 635" fill="currentColor">
  <!-- Top card with rounded corners -->
  <rect x="163" y="58" width="437" height="100" rx="30" fill="currentColor"/>

  <!-- Two pill buttons on top card -->
  <ellipse cx="460" cy="108" rx="45" ry="22" fill="#1e293b"/>
  <ellipse cx="545" cy="108" rx="45" ry="22" fill="#1e293b"/>

  <!-- Bottom larger card with rounded corners -->
  <rect x="163" y="213" width="437" height="282" rx="30" fill="currentColor"/>

  <!-- Three horizontal lines in bottom card (content lines) -->
  <rect x="372" y="248" width="190" height="35" rx="17.5" fill="#1e293b"/>
  <rect x="372" y="313" width="190" height="35" rx="17.5" fill="#1e293b"/>
  <rect x="372" y="378" width="190" height="35" rx="17.5" fill="#1e293b"/>

  <!-- Large play button circle overlaying bottom left -->
  <circle cx="180" cy="450" r="158" fill="currentColor" stroke="currentColor" stroke-width="20"/>
  <circle cx="180" cy="450" r="120" fill="none" stroke="currentColor" stroke-width="32"/>

  <!-- Play triangle -->
  <path d="M 150 400 L 150 500 L 240 450 Z" fill="currentColor"/>
</svg>
